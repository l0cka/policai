name: Collect AI policy developments

on:
  schedule:
    # Daily at ~05:30 Australia/Sydney (19:30 UTC previous day)
    - cron: "30 19 * * *"
  workflow_dispatch:
    inputs:
      source:
        description: "Run a single source id (optional)"
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: collect
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run collector
        env:
          # Optional — enables AI classification. Without a key the collector
          # falls back to keyword heuristics (detections marked for review).
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          AI_MODEL: ${{ vars.AI_MODEL }}
          SOURCE_ID: ${{ inputs.source }}
        run: |
          if [ -n "$SOURCE_ID" ]; then
            npm run collect -- --source="$SOURCE_ID"
          else
            npm run collect
          fi

      - name: Validate data
        run: npm run validate:data

      - name: Guard the curated registry
        run: |
          # The collector must never modify the curated policy registry.
          if ! git diff --quiet -- public/data/policies.json; then
            echo "::error::Collector modified public/data/policies.json — aborting."
            git diff -- public/data/policies.json
            exit 1
          fi

      - name: Commit and push changes
        run: |
          if git diff --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name "policai-collector[bot]"
          git config user.email "policai-collector[bot]@users.noreply.github.com"
          git add public/data/developments.json public/data/meta.json data/watch-state.json data/source-reviews.json
          git commit -m "chore(data): daily collection $(date -u +%F)"
          git push
