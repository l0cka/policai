name: Collect AI policy developments

on:
  schedule:
    # Daily at ~05:30 Australia/Sydney (19:30 UTC previous day)
    - cron: "30 19 * * *"
  workflow_dispatch:
    inputs:
      source:
        description: "Run a single source id (optional)"
        required: false
        type: string

permissions:
  contents: write
  issues: write

concurrency:
  group: collect
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          # Fetch and push over SSH as the collector deploy key, which is a
          # bypass actor on the "Protect main" ruleset. The default
          # GITHUB_TOKEN cannot push to main — see docs/collector.md.
          ssh-key: ${{ secrets.COLLECTOR_DEPLOY_KEY }}

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20.19.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright Chromium
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install headless Chromium for browser retrieval
        run: npx playwright-core install --with-deps chromium

      - name: Run collector
        id: collector
        continue-on-error: true
        env:
          SOURCE_ID: ${{ inputs.source }}
        run: |
          if [ -n "$SOURCE_ID" ]; then
            npm run collect -- --source="$SOURCE_ID"
          else
            npm run collect
          fi

      - name: Validate data
        run: npm run validate:data

      - name: Guard the curated registry
        run: |
          # The collector must never modify the curated policy registry.
          if ! git diff --quiet -- data/policies.json; then
            echo "::error::Collector modified data/policies.json — aborting."
            git diff -- data/policies.json
            exit 1
          fi

      - name: Commit and push changes
        run: |
          if git diff --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name "policai-collector[bot]"
          git config user.email "policai-collector[bot]@users.noreply.github.com"
          git add data/developments.json public/data/meta.json data/watch-state.json data/source-reviews.json
          git commit -m "chore(data): daily collection $(date -u +%F)"
          # Back-to-back dispatched runs can race this push; rebase the data
          # commit onto whatever landed in the meantime and retry.
          for attempt in 1 2 3; do
            if git push; then
              exit 0
            fi
            echo "Push rejected (attempt ${attempt}); rebasing onto latest main."
            git pull --rebase origin main
          done
          git push

      - name: Fail after preserving unhealthy collection state
        if: steps.collector.outcome == 'failure'
        run: |
          echo "::error::Collector reported failed coverage or a fatal error; operational state was preserved before failing."
          exit 1

      - name: Alert on failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Open (or comment on) a tracking issue so scheduled failures are
          # never silent. Deduplicates into one open issue at a time.
          gh label create collector-failure \
            --description "Automated alert from collect.yml" \
            --color D93F0B || true
          run_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          existing=$(gh issue list --label collector-failure --state open --json number --jq '.[0].number')
          if [ -n "$existing" ]; then
            gh issue comment "$existing" --body "Still failing: $run_url"
          else
            gh issue create \
              --title "Daily collection workflow is failing" \
              --label collector-failure \
              --body "$(printf 'The scheduled collector run failed.\n\nLatest failed run: %s\n\nOpened automatically by collect.yml; further failures are added as comments while this issue stays open. Close it once the workflow is green.' "$run_url")"
          fi
